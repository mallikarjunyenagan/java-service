<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Student Report</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            color: #333;
        }

        .container {
            border: 1px solid #cccccc;
            padding: 20px;
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .section-title {
            background-color: #f2f2f2;
            padding: 8px;
            font-weight: bold;
            margin-top: 20px;
            border-left: 5px solid #3498db;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td {
            border: 1px solid #dddddd;
            padding: 10px;
        }

        .label {
            width: 30%;
            font-weight: bold;
            background-color: #fafafa;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">
        Student Information Report
    </div>

    <!-- Basic Details -->
    <div class="section-title">Basic Details</div>

    <table>
        <tr>
            <td class="label">ID</td>
            <td th:text="${student.id}"></td>
        </tr>

        <tr>
            <td class="label">Name</td>
            <td th:text="${student.name}"></td>
        </tr>

        <tr>
            <td class="label">Email</td>
            <td th:text="${student.email}"></td>
        </tr>

        <tr>
            <td class="label">Phone</td>
            <td th:text="${student.phone}"></td>
        </tr>

        <tr>
            <td class="label">Gender</td>
            <td th:text="${student.gender}"></td>
        </tr>

        <tr>
            <td class="label">DOB</td>
            <td th:text="${student.dob}"></td>
        </tr>

        <tr>
            <td class="label">System Access</td>
            <td th:text="${student.systemAccess ? 'Yes' : 'No'}"></td>
        </tr>
    </table>

    <!-- Parent Details -->
    <div class="section-title">Parent Details</div>

    <table>

        <tr>
            <td class="label">Father Name</td>
            <td th:text="${student.fatherName ?: 'N/A'}"></td>
        </tr>

        <tr>
            <td class="label">Father Phone</td>
            <td th:text="${student.fatherPhone ?: 'N/A'}"></td>
        </tr>

        <tr>
            <td class="label">Mother Name</td>
            <td th:text="${student.motherName ?: 'N/A'}"></td>
        </tr>

        <tr>
            <td class="label">Mother Phone</td>
            <td th:text="${student.motherPhone ?: 'N/A'}"></td>
        </tr>

    </table>

    <!-- Guardian -->
    <div class="section-title">Guardian Details</div>

    <table>

        <tr>
            <td class="label">Guardian Name</td>
            <td th:text="${student.guardianName ?: 'N/A'}"></td>
        </tr>

        <tr>
            <td class="label">Guardian Phone</td>
            <td th:text="${student.guardianPhone ?: 'N/A'}"></td>
        </tr>

        <tr>
            <td class="label">Relation</td>
            <td th:text="${student.relationOfGuardian ?: 'N/A'}"></td>
        </tr>

    </table>

    <!-- Address -->
    <div class="section-title">Address Details</div>

    <table>

        <tr>
            <td class="label">Current Address</td>
            <td th:text="${student.currentAddress ?: 'N/A'}"></td>
        </tr>

        <tr>
            <td class="label">Permanent Address</td>
            <td th:text="${student.permanentAddress ?: 'N/A'}"></td>
        </tr>

    </table>

</div>

</body>
</html>
